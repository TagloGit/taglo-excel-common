name: Publish NuGet Package

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: windows-latest

    permissions:
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: Pack
        run: dotnet pack src/Taglo.Excel.Common/Taglo.Excel.Common.csproj --configuration Release -p:PackageVersion=${{ steps.version.outputs.VERSION }} --output nupkg

      - name: Verify package
        run: Get-ChildItem nupkg

      - name: Push to GitHub Packages
        run: dotnet nuget push "nupkg/Taglo.Excel.Common.${{ steps.version.outputs.VERSION }}.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source "https://nuget.pkg.github.com/TagloGit/index.json"
